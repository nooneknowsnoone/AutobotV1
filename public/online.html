<!DOCTYPE html>
<html lang="en">
<head>
  <title>Active</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://i.imgur.com/BNKq0fl.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #0b0c2a, #1f1b3a);
      color: #f5f5f5;
      font-family: 'Poppins', sans-serif;
      padding-top: 56px; /* raised navbar by reducing padding */
    }

    .navbar {
      background-color: #1b1530 !important;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .navbar-brand, .navbar-nav .nav-link {
      color: #ffffff !important;
    }

    .navbar-nav .nav-link:hover {
      color: #c084fc !important;
    }

    .dropdown-menu {
      background-color: #271f46;
      border: none;
    }

    .dropdown-item {
      color: #ccc;
    }

    .dropdown-item:hover {
      background-color: #3a2c5c;
      color: white;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 25px rgba(192, 132, 252, 0.15);
    }

    h1 {
      color: #c084fc;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .user-card {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 15px rgba(192, 132, 252, 0.1);
      animation: glow 3s infinite alternate;
      transition: transform 0.3s ease-in-out;
    }

    .user-card:hover {
      transform: scale(1.01);
      box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
    }

    @keyframes glow {
      from {
        border-color: #6c3fbf;
      }
      to {
        border-color: #a855f7;
      }
    }

    .user-card img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 12px;
      margin-right: 15px;
      border: 2px solid #8b5cf6;
    }

    .user-info h4 {
      font-size: 16px;
      color: #fceaff;
      margin-bottom: 3px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-info p {
      font-size: 13px;
      color: #ddd;
      margin: 0;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alert-danger {
      background-color: #6b0c1b;
      border-color: #dc3545;
      color: #fff;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <a class="navbar-brand" href="#">Active</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav" style="margin-right: 80px;">
      <ul class="navbar-nav">
        <li class="nav-item active">
          <a class="nav-link" href="#">Active<span class="sr-only">(current)</span></a>
        </li>
 <li class="nav-item"><a class="nav-link" href="site">Autobot</a></li>
        <li class="nav-item">
  <li class="nav-item"><a class="nav-link" href="https://wildan-suldyir-apis.vercel.app/">API</a></li>
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="false">Features</a>
          <div class="dropdown-menu" aria-labelledby="navbarDropdown">
            <a class="dropdown-item" href="#">Cookies Extractor</a>
            <div class="dropdown-divider"></div>
            <a class="dropdown-item" href="/step_by_step_guide">Step-by-Step Guide</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4 mb-4">
    <div class="row">
      <h1 class="col text-start">Current Online:</h1>
    </div>
    <div class="row" id="user_online"></div>
  </div>

  <script>
    async function listOfAi() {
      const userOnline = document.getElementById("user_online");
      try {
        const response = await fetch("/info");
        const data = await response.json();
        userOnline.innerHTML = '';
        data.forEach(user => {
          const { name, thumbSrc, profileUrl, time } = user;

          const userCard = document.createElement('div');
          userCard.className = 'col-12 user-card';

          const image = document.createElement('img');
          image.src = thumbSrc;
          image.alt = 'User Thumbnail';

          const userInfo = document.createElement('div');
          userInfo.className = 'user-info';

          const userName = document.createElement('h4');
          userName.textContent = name;

          const profileLink = document.createElement('p');
          profileLink.innerHTML = profileUrl;

          const uptimeUser = document.createElement('p');
          uptimeUser.className = 'uptime-user';
          uptimeUser.innerHTML = `Uptime: ${timeFormat(time)}`;

          userInfo.appendChild(userName);
          userInfo.appendChild(profileLink);
          userInfo.appendChild(uptimeUser);

          userCard.appendChild(image);
          userCard.appendChild(userInfo);

          userOnline.appendChild(userCard);

          setInterval(() => {
            user.time++;
            updateTimer(userCard, user.time);
          }, 1000);
        });
      } catch (error) {
        console.error(error);
        userOnline.innerHTML = `<div class="alert alert-danger" role="alert">An error occurred while fetching data.</div>`;
      }
    }

    function updateTimer(userCard, currentTime) {
      const uptimeUser = userCard.querySelector('.uptime-user');
      uptimeUser.textContent = `Uptime: ${timeFormat(currentTime)}`;
    }

    function timeFormat(currentTime) {
      const days = Math.floor(currentTime / (3600 * 24));
      const hours = Math.floor((currentTime % (3600 * 24)) / 3600);
      const minutes = Math.floor((currentTime % 3600) / 60);
      const seconds = currentTime % 60;

      let timeFormat = '';
      if (days > 0) timeFormat += `${days} day${days > 1 ? 's' : ''} `;
      if (hours > 0) timeFormat += `${hours} hour${hours > 1 ? 's' : ''} `;
      if (minutes > 0) timeFormat += `${minutes} minute${minutes > 1 ? 's' : ''} `;
      timeFormat += `${seconds} second${seconds > 1 ? 's' : ''}`;

      return timeFormat.trim();
    }

    listOfAi();
  </script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
